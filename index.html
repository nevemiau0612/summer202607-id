<script>
        // 資料庫：新增了 'group' 欄位
        const db = {
            "P10501": { name: "陳正義", dept: "自由方程式警局", title: "新手警員", group: "第一巡邏組" },
            "P10502": { name: "林志強", dept: "自由方程式警局", title: "新手警員", group: "第二巡邏組" }
        };

        function onScanSuccess(decodedText) {
            const id = decodedText.trim();
            const person = db[id];
            const div = document.getElementById('result');
            
            if (person) {
                document.getElementById('msg').innerText = "✅ 報到成功：" + person.name;
                // 在這裡加入了組別顯示
                document.getElementById('info').innerText = 
                    `單位：${person.dept} | 職稱：${person.title} | 組別：${person.group}`;
                div.style.backgroundColor = "#d4edda";
            } else {
                document.getElementById('msg').innerText = "❌ 無此編號：" + id;
                document.getElementById('info').innerText = "查無此人，請確認編號";
                div.style.backgroundColor = "#f8d7da";
            }
            div.style.display = "block";
            setTimeout(() => { div.style.display = "none"; }, 5000);
        }

        // 初始化掃描器
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "user" }, 
            { fps: 10, qrbox: 250 },
            onScanSuccess
        ).catch(err => {
            alert("無法啟動相機，請確認已允許權限。");
        });
    </script>
