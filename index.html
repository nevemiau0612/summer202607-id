<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.F.P.D 報到終端</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            margin: 0; padding: 20px;
            background-color: #05080a !important; 
            color: #00e5ff !important; 
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .header-line { width: 100%; max-width: 400px; border-bottom: 2px solid #00e5ff; margin-bottom: 20px; text-align: center; }

        /* 掃描框框架與鏡像處理 */
        #reader { 
            width: 100%; max-width: 400px; height: 400px;
            border: 3px solid #00e5ff;
            background: #000;
            overflow: hidden; /* 強制鏡頭內容不溢出 */
            position: relative;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }
        
        /* 鏡像與內容填充 */
        #reader video { 
            transform: scaleX(-1); 
            object-fit: cover; 
            width: 100%; height: 100%;
        }

        .result { 
            width: 100%; max-width: 400px; padding: 20px;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid #00e5ff;
            margin-top: 20px; text-align: center; display: none;
            text-shadow: 0 0 5px #00e5ff;
        }
    </style>
</head>
<body>

    <h1>自由方程式警局終端</h1>
    <div class="header-line">[ G.F.P.D SECURITY ACCESS ]</div>
    
    <div id="reader"></div>

    <div id="result" class="result">
        <h2 id="msg"></h2>
        <p id="info"></p>
    </div>

    <script>
        const db = {
            "P001": { name: "黃軒樂", group: "第一組", dept: "自由方程式警局", title: "新手警員" },
            "P002": { name: "江譽馨", group: "第一組", dept: "自由方程式警局", title: "新手警員" },
            // ... (請確保這裡有完整的31筆資料)
        };

        function onScanSuccess(decodedText) {
            const id = decodedText.trim();
            const person = db[id];
            const div = document.getElementById('result');
            div.style.display = "block";
            
            if (person) {
                document.getElementById('msg').innerText = ">> ACCESS GRANTED";
                document.getElementById('info').innerHTML = `NAME: ${person.name}<br>DEPT: ${person.dept}<br>TITLE: ${person.title}<br>GROUP: ${person.group}`;
            } else {
                document.getElementById('msg').innerText = ">> ACCESS DENIED";
                document.getElementById('info').innerText = "ID " + id + " NOT FOUND";
            }
            setTimeout(() => { div.style.display = "none"; }, 5000);
        }

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "user" }, { fps: 15, qrbox: 250 }, onScanSuccess);
    </script>
</body>
</html>
