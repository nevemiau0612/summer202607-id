<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由方城市警員報到系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
    /* 強制定義樣式，避免 iPad 自動反轉顏色 */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #f4f4f9 !important; /* 強制背景淺灰色 */
    }

    body { 
        text-align: center; 
        padding: 20px; 
        font-family: sans-serif; 
        color: #000000 !important; /* 強制文字為黑色 */
    }

    #reader { 
        width: 100%; 
        max-width: 400px; 
        margin: auto; 
        border: 2px solid #ccc; 
        background-color: #ffffff !important; /* 強制掃描框背景為白色 */
    }

    .result { 
        margin-top: 20px; 
        padding: 20px; 
        border-radius: 10px; 
        display: none; 
    }

    .card { 
        background-color: #ffffff !important; /* 強制結果卡片背景為白色 */
        padding: 15px; 
        border-radius: 8px; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        color: #000000 !important;
    }

    /* 防止 iOS 自動改變顏色 */
    @media (prefers-color-scheme: dark) {
        body { background-color: #f4f4f9 !important; }
        .card { background-color: #ffffff !important; color: #000000 !important; }
    }
</style>
</head>
<body>

    <h1>🚨 自由方城市警員報到系統🚨 </h1>
    <div id="reader"></div>

    <div id="result" class="result">
        <div class="card">
            <h2 id="msg"></h2>
            <p id="info"></p>
        </div>
    </div>

            "P008": { name: "謝礽", group: "第二組", dept: "自由方程式警局", title: "新手警員" },

            "P013": { name: "姜允媃", group: "第三組", dept: "自由方程式警局", title: "新手警員" },

            "P031": { name: "秦恩冕", group: "第六組", dept: "自由方程式警局", title: "新手警員" }
        };

        function onScanSuccess(decodedText) {
            const id = decodedText.trim();
            const person = db[id];
            const div = document.getElementById('result');
            
            if (person) {
                document.getElementById('msg').innerText = "✅ 報到成功：" + person.name;
                document.getElementById('info').innerText = 
                    `單位：${person.dept} | 職稱：${person.title} | ${person.group}`;
                div.style.backgroundColor = "#d4edda";
            } else {
                document.getElementById('msg').innerText = "❌ 無此編號：" + id;
                document.getElementById('info').innerText = "查無此人，請確認編號是否正確";
                div.style.backgroundColor = "#f8d7da";
            }
            div.style.display = "block";
            setTimeout(() => { div.style.display = "none"; }, 5000);
        }

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "user" }, 
            { fps: 10, qrbox: 250 },
            onScanSuccess
        ).catch(err => {
            alert("相機啟動失敗，請確認已允許權限。");
        });
    </script>
</body>
</html>
