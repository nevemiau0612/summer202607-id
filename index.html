<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶石報到終端</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 強制全局居中排版 */
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #050b15 !important; color: #00e5ff !important;
            font-family: 'Orbitron', sans-serif; /* 科技感字體 */
        }

        .container { 
            width: 90%; max-width: 450px; text-align: center;
        }

        h1 { margin-bottom: 20px; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 10px #00e5ff; }

        /* 掃描框增加寶石光澤邊框 */
        #reader { 
            border: 3px solid #00e5ff;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.3);
        }

        /* 報到結果卡片 */
        .result { 
            margin-top: 20px; padding: 20px; border-radius: 15px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            backdrop-filter: blur(10px);
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 報到終端</h1>
    <div id="reader"></div>
    <div id="result" class="result">
        <h2 id="msg"></h2>
        <p id="info"></p>
    </div>
</div>

<script>
    // 名單資料庫 (保持你的完整名單)
    const db = {
        "P001": { name: "黃軒樂", group: "第一組", dept: "自由方程式警局", title: "新手警員" },
        "P002": { name: "江譽馨", group: "第一組", dept: "自由方程式警局", title: "新手警員" },
        // ... 此處保持你原本的 31 筆完整名單 ...
    };

    function onScanSuccess(decodedText) {
        const id = decodedText.trim();
        const person = db[id];
        const div = document.getElementById('result');
        
        if (person) {
            document.getElementById('msg').innerText = "✅ 認證通過：" + person.name;
            document.getElementById('info').innerText = `${person.dept} | ${person.title} | ${person.group}`;
            div.style.backgroundColor = "rgba(0, 255, 100, 0.2)";
        } else {
            document.getElementById('msg').innerText = "❌ 認證失敗：" + id;
            document.getElementById('info').innerText = "無效編號，請重新掃描";
            div.style.backgroundColor = "rgba(255, 0, 0, 0.2)";
        }
        div.style.display = "block";
        setTimeout(() => { div.style.display = "none"; }, 5000);
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "user" }, { fps: 15, qrbox: 250 }, onScanSuccess);
</script>
</body>
</html>
