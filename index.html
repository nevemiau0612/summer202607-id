<script>
    // 資料庫：把單位與職稱也寫進去，確保一定顯示
    const db = {
        "P001": { name: "黃軒樂", group: "第一組", dept: "自由方程式警局", title: "新手警員" },
        "P002": { name: "江譽馨", group: "第一組", dept: "自由方程式警局", title: "新手警員" },
        // ... (以此類推)
        "P031": { name: "秦恩冕", group: "第六組", dept: "自由方程式警局", title: "新手警員" }
    };

    function onScanSuccess(decodedText) {
        const id = decodedText.trim();
        const person = db[id];
        const div = document.getElementById('result');
        
        if (person) {
            document.getElementById('msg').innerText = "✅ 報到成功：" + person.name;
            // 這裡直接引用資料庫裡的欄位，就不會漏掉了
            document.getElementById('info').innerText = 
                `單位：${person.dept} | 職稱：${person.title} | 組別：${person.group}`;
            div.style.backgroundColor = "#d4edda";
        } else {
            // 如果查不到資料，顯示「查無此編號」
            document.getElementById('msg').innerText = "❌ 查無此編號：" + id;
            document.getElementById('info').innerText = "請檢查 QR Code 編號是否正確";
            div.style.backgroundColor = "#f8d7da";
        }
        div.style.display = "block";
        setTimeout(() => { div.style.display = "none"; }, 5000);
    }
    // ... (後續啟動代碼不變)
</script>
