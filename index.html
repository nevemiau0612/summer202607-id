<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 警員寶石報到終端機</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        :root {
            --term-bg: #0d0d1a;
            --term-metal: #22223b;
            --gem-purple: #9d4edd;
            --gem-glow: rgba(157, 78, 221, 0.6);
            --text-glow-blue: #a0d8f1;
            --text-gold: #f7e6c4;
            --text-gold-light: #fff8eb;
        }

        body {
            font-family: 'Noto Sans TC', 'Orbitron', sans-serif;
            background: linear-gradient(135deg, var(--term-bg) 0%, #1a1a2e 100%);
            color: var(--text-glow-blue);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: space-around;
        }

        /* 終端機主體框 */
        #terminal-chassis {
            width: 100%;
            max-width: 700px;
            background: var(--term-metal);
            border: 2px solid #333;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 10px rgba(100, 100, 200, 0.2) inset;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #terminal-chassis::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/circuit-board.png');
            opacity: 0.1;
            pointer-events: none;
        }

        /* 標題 */
        .term-title {
            color: var(--text-gold);
            font-size: 2.2rem;
            text-shadow: 0 0 10px var(--text-gold), 0 0 5px #000;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
        }

        /* 掃描區域容器 */
        #scanner-core {
            width: 90%;
            max-width: 450px;
            background: #000;
            border: 3px solid #555;
            border-radius: 50%; /* 圓形核心 */
            box-shadow: 0 0 20px rgba(0, 0, 100, 0.5), 0 0 15px rgba(100, 255, 255, 0.2) inset;
            padding: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 🔥 關鍵修正：直接在容器級別進行視覺上的鏡像翻轉 */
            transform: scaleX(-1); 
            -webkit-transform: scaleX(-1);
        }

        #scanner-core::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 70%, #000 100%);
            pointer-events: none;
        }

        /* 掃描區域內核 */
        #reader {
            width: 100%;
            border: 2px solid rgba(100, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(1.1); /* 稍微放大以融入圓形框 */
            overflow: hidden;
        }

        /* 讓套件內部的 video 和 canvas 保持原樣，不單獨破壞它 */
        #reader video {
            border-radius: 50%;
            object-fit: cover;
        }

        /* 提示文字（因為外層被翻轉了，提示文字要在外面，才不會變成反字） */
        .scan-prompt {
            color: var(--text-glow-blue);
            font-size: 1.1rem;
            text-shadow: 0 0 5px var(--text-glow-blue);
            margin-top: 15px;
            z-index: 10;
        }

        /* 彈出視窗樣式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        /* 寶石彈窗主體 */
        .gem-terminal {
            background: radial-gradient(circle, #5e289c 0%, #1d1135 100%);
            border: 3px solid silver;
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; 
            width: 90%;
            max-width: 440px;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 60px var(--gem-glow), 0 0 20px rgba(255, 255, 255, 0.2) inset;
            text-align: center;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 480px;
            box-sizing: border-box;
        }

        .gem-terminal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/cut-crystal.png');
            opacity: 0.15;
            pointer-events: none;
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
        }

        /* 頭像框 */
        .avatar-frame {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--gem-purple);
            background-color: rgba(30, 10, 50, 0.5);
            margin: 0 auto 15px;
            background-size: cover;
