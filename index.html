<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由方城市警員報到系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
<style>
    /* 強制深色主題，鎖死顏色 */
    :root {
        --primary-color: #00e5ff; /* 寶石藍/青色光 */
        --bg-color: #050b15;
    }

    body {
        margin: 0;
        padding: 20px;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%) !important;
        color: white !important;
        min-height: 100vh;
    }

    h1 {
        text-transform: uppercase;
        letter-spacing: 5px;
        font-weight: 300;
        text-shadow: 0 0 15px var(--primary-color);
        margin-bottom: 30px;
    }

    #reader {
        width: 100%;
        max-width: 450px;
        margin: auto;
        border: 1px solid rgba(0, 229, 255, 0.5);
        background: rgba(0, 0, 0, 0.6) !important;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
    }

    .result {
        margin-top: 25px;
        padding: 25px;
        background: rgba(255, 255, 255, 0.05) !important;
        backdrop-filter: blur(10px); /* 毛玻璃特效 */
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        display: none;
    }

    .card {
        background: transparent !important;
    }

    #msg { color: var(--primary-color); }
    #info { font-size: 1.1em; opacity: 0.8; }
</style>
</head>
<body>

    <h1>🚨 自由方城市警員報到系統🚨 </h1>
    <div id="reader"></div>

    <div id="result" class="result">
        <div class="card">
            <h2 id="msg"></h2>
            <p id="info"></p>
        </div>
    </div>

    <script>
        const db = {
            "P001": { name: "黃軒樂", group: "第一組", dept: "自由方程式警局", title: "新手警員" },

            "P006": { name: "江欣妮", group: "第二組", dept: "自由方程式警局", title: "新手警員" },
            "P007": { name: "洪孜甯", group: "第二組", dept: "自由方程式警局", title: "新手警員" },
            "P008": { name: "謝礽", group: "第二組", dept: "自由方程式警局", title: "新手警員" },
            "P009": { name: "曾愷心", group: "第二組", dept: "自由方程式警局", title: "新手警員" },
            "P010": { name: "周婷儀", group: "第二組", dept: "自由方程式警局", title: "新手警員" },
            "P011": { name: "秦恩惠", group: "第二組", dept: "自由方程式警局", title: "新手警員" },
            "P012": { name: "張晏寧", group: "第三組", dept: "自由方程式警局", title: "新手警員" },
            "P013": { name: "姜允媃", group: "第三組", dept: "自由方程式警局", title: "新手警員" },
            "P014": { name: "侯邵博", group: "第三組", dept: "自由方程式警局", title: "新手警員" },
            "P015": { name: "陳柏宇", group: "第三組", dept: "自由方程式警局", title: "新手警員" },

            "P020": { name: "洪孜丞", group: "第五組", dept: "自由方程式警局", title: "新手警員" },

            "P031": { name: "秦恩冕", group: "第六組", dept: "自由方程式警局", title: "新手警員" }
        };

        function onScanSuccess(decodedText) {
            const id = decodedText.trim();
            const person = db[id];
            const div = document.getElementById('result');
            
            if (person) {
                document.getElementById('msg').innerText = "✅ 報到成功：" + person.name;
                document.getElementById('info').innerText = 
                    `單位：${person.dept} | 職稱：${person.title} | ${person.group}`;
                div.style.backgroundColor = "#d4edda";
            } else {
                document.getElementById('msg').innerText = "❌ 無此編號：" + id;
                document.getElementById('info').innerText = "查無此人，請確認編號是否正確";
                div.style.backgroundColor = "#f8d7da";
            }
            div.style.display = "block";
            setTimeout(() => { div.style.display = "none"; }, 5000);
        }

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "user" }, 
            { fps: 10, qrbox: 250 },
            onScanSuccess
        ).catch(err => {
            alert("相機啟動失敗，請確認已允許權限。");
        });
    </script>
</body>
</html>
