<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.F.P.D 自由方城市報到終端機</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 背景網格與掃描線動畫 */
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #00040a !important;
            color: #00ffcc !important;
            font-family: 'Courier New', monospace;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .terminal { width: 90%; max-width: 450px; text-align: center; z-index: 1; }

        /* 掃描框：移除鏡像 (scaleX(-1) 代表鏡射，調整回 1 則不鏡射) */
        #reader { 
            border: 2px solid #00ffcc;
            border-radius: 5px;
            background: #000;
            box-shadow: 0 0 15px #00ffcc, inset 0 0 10px #00ffcc;
            position: relative;
        }
        #reader video { transform: scaleX(-1) !important; }

        h1 { 
            font-size: 22px; text-transform: uppercase; 
            text-shadow: 0 0 8px #00ffcc; margin-bottom: 25px;
            border-bottom: 2px solid #00ffcc; padding-bottom: 10px;
        }

        .result { 
            margin-top: 25px; padding: 20px;
            background: rgba(0, 20, 20, 0.9);
            border: 1px solid #00ffcc;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="terminal">
    <h1>[ G.F.P.D SECURITY ACCESS ]</h1>
    <div id="reader"></div>
    <div id="result" class="result">

</div>

    function onScanSuccess(decodedText) {
        const id = decodedText.trim();
        const person = db[id];
        const div = document.getElementById('result');
        div.style.display = "block";
        
        if (person) {
            document.getElementById('msg').innerText = "> STATUS: ACCESS GRANTED";
            document.getElementById('info').innerHTML = `NAME: ${person.name}<br>DEPT: ${person.dept}<br>TITLE: ${person.title}<br>GROUP: ${person.group}`;
        } else {
            document.getElementById('msg').innerText = "> STATUS: ACCESS DENIED";
            document.getElementById('info').innerText = "ID " + id + " NOT FOUND IN DATABASE";
        }
        setTimeout(() => { div.style.display = "none"; }, 5000);
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "user" }, { fps: 15, qrbox: 250 }, onScanSuccess);
