<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>警員報到系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg-color: #f4f4f9; --card-bg: #ffffff; }
        body { 
            text-align: center; padding: 20px; font-family: sans-serif; 
            background-color: var(--bg-color) !important; color: #000 !important; 
        }
        #reader { width: 100%; max-width: 400px; margin: auto; border: 2px solid #ccc; background: white; }
        .result { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; }
        .card { background: var(--card-bg) !important; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>🚨 報到終端</h1>
    <div id="reader"></div>

    <div id="result" class="result">
        <div class="card">
            <h2 id="msg"></h2>
            <p id="info"></p>
        </div>
    </div>

    <script>
        // 資料庫：修改這裡來新增警員
        const db = {
            "P10501": { name: "陳正義", dept: "自由方程式警局", title: "新手警員" },
            "P10502": { name: "林志強", dept: "自由方程式警局", title: "新手警員" }
        };

        function onScanSuccess(decodedText) {
            const id = decodedText.trim();
            const person = db[id];
            const div = document.getElementById('result');
            
            if (person) {
                document.getElementById('msg').innerText = "✅ 報到成功：" + person.name;
                document.getElementById('info').innerText = "單位：" + person.dept + " | 職稱：" + person.title;
                div.style.backgroundColor = "#d4edda";
            } else {
                document.getElementById('msg').innerText = "❌ 無此編號：" + id;
                document.getElementById('info').innerText = "查無此人，請確認編號";
                div.style.backgroundColor = "#f8d7da";
            }
            div.style.display = "block";
            setTimeout(() => { div.style.display = "none"; }, 5000);
        }

        // 高靈敏度掃描器設定
        const scanner = new Html5QrcodeScanner("reader", { 
            fps: 20, 
            qrbox: { width: 250, height: 250 },
            rememberLastUsedCamera: true
        });
        scanner.render(onScanSuccess);
    </script>
</body>
</html>
