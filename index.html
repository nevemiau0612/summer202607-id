<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🚨 AI警員報到終端機</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    margin:0;
    background:linear-gradient(135deg,#07111f,#141b2f);
    color:white;
    font-family:"Noto Sans TC",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#terminal{
    width:95%;
    max-width:700px;
    text-align:center;
}

h1{
    color:#00e5ff;
    text-shadow:0 0 15px #00e5ff;
}

#scanner-frame{
    margin:auto;
    width:350px;
    height:350px;
    border-radius:50%;
    overflow:hidden;
    border:6px solid #00e5ff;
    box-shadow:
        0 0 30px #00e5ff,
        inset 0 0 30px rgba(0,229,255,.3);
    background:black;
}

#reader{
    width:100%;
    height:100%;
}

/* 自拍鏡像效果 */
#reader video{
    transform:scaleX(-1);
    -webkit-transform:scaleX(-1);
}

.tip{
    margin-top:20px;
    font-size:20px;
    color:#80ffff;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.card{
    width:90%;
    max-width:500px;
    background:#1a1a2e;
    border:3px solid #00e5ff;
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 40px #00e5ff;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:auto;
    background-size:cover;
    background-position:center;
    border:4px solid #00e5ff;
}

.success{
    color:#4ade80;
    font-size:28px;
    margin-bottom:20px;
}

table{
    width:100%;
    margin-top:20px;
}

td{
    padding:10px;
    text-align:left;
}

button{
    margin-top:20px;
    background:#00e5ff;
    color:black;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

</style>
</head>

<body>

<div id="terminal">

    <h1>🚨 AI警員報到終端機</h1>

    <div id="scanner-frame">
        <div id="reader"></div>
    </div>

    <div class="tip">
        請將警員 QR Code 對準掃描區域
    </div>

</div>

<!-- 彈窗 -->

<div id="modal" class="modal">

    <div class="card">

        <div class="success">
            ✅ 報到成功
        </div>

        <div id="avatar" class="avatar"></div>

        <table>

            <tr>
                <td>警員編號</td>
                <td id="officerId"></td>
            </tr>

            <tr>
                <td>姓名</td>
                <td id="officerName"></td>
            </tr>

            <tr>
                <td>單位</td>
                <td id="officerDept"></td>
            </tr>

            <tr>
                <td>職稱</td>
                <td id="officerTitle"></td>
            </tr>

            <tr>
                <td>報到時間</td>
                <td id="checkinTime"></td>
            </tr>

        </table>

        <button onclick="closeModal()">
            確認並繼續掃描
        </button>

    </div>

</div>

<script>

/* =======================
   警員資料庫
======================= */

const officers = {

    "P10501":{
        name:"陳正義",
        dept:"刑事警察第一隊",
        title:"偵查員",
        avatar:"https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=300"
    },

    "P10502":{
        name:"林志強",
        dept:"交通警察大隊",
        title:"警員",
        avatar:"https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=300"
    },

    "P10503":{
        name:"張明輝",
        dept:"保安警察大隊",
        title:"中隊長",
        avatar:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300"
    }

};

let scanner;
let canScan = true;

/* =======================
   掃描成功
======================= */

function onScanSuccess(decodedText){

    if(!canScan) return;

    canScan = false;

    const officer = officers[decodedText];

    if(!officer){

        alert("查無此警員資料");

        canScan = true;
        return;
    }

    document.getElementById("officerId").innerText = decodedText;
    document.getElementById("officerName").innerText = officer.name;
    document.getElementById("officerDept").innerText = officer.dept;
    document.getElementById("officerTitle").innerText = officer.title;

    document.getElementById("avatar").style.backgroundImage =
        `url('${officer.avatar}')`;

    document.getElementById("checkinTime").innerText =
        new Date().toLocaleTimeString();

    document.getElementById("modal").style.display = "flex";
}

/* =======================
   掃描錯誤
======================= */

function onScanError(){}

/* =======================
   關閉彈窗
======================= */

function closeModal(){

    document.getElementById("modal").style.display="none";

    setTimeout(()=>{
        canScan=true;
    },1000);
}

/* =======================
   啟動掃描器
======================= */

window.onload=()=>{

    scanner = new Html5QrcodeScanner(
        "reader",
        {
            fps:10,
            qrbox:250,
            aspectRatio:1
        }
    );

    scanner.render(
        onScanSuccess,
        onScanError
    );

    /* 強制鏡像 */

    const observer = new MutationObserver(()=>{

        const video =
            document.querySelector("#reader video");

        if(video){

            video.style.transform="scaleX(-1)";
            video.style.webkitTransform="scaleX(-1)";

            observer.disconnect();
        }
    });

    observer.observe(document.body,{
        childList:true,
        subtree:true
    });

};

</script>

</body>
</html>
