            margin: 0; padding: 20px;
            background-color: #05080a !important; 
            color: #00f2ff !important; 
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh;
        }

        h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        
        .status-header { 
            font-size: 1rem; border-top: 1px solid #00f2ff; border-bottom: 1px solid #00f2ff; 
            padding: 10px 0; margin-bottom: 20px; width: 100%; max-width: 400px;
        }

        #reader { 
            width: 100%; max-width: 400px; 
            border: 2px solid #00f2ff;
            background: #000;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            margin-bottom: 20px;
        }

        .result { 
            width: 100%; max-width: 400px; padding: 20px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid #00f2ff;
            display: none; text-align: center;
        }
    </style>

        function onScanSuccess(decodedText) {
            const id = decodedText.trim();
            const person = db[id];
            const div = document.getElementById('result');
            div.style.display = "block";
            if (person) {
                document.getElementById('msg').innerText = "AUTHORIZED: " + person.name;
                document.getElementById('info').innerText = `${person.dept} | ${person.title} | ${person.group}`;
            } else {
                document.getElementById('msg').innerText = "ACCESS DENIED";
                document.getElementById('info').innerText = "ID " + id + " NOT FOUND";
            }
            setTimeout(() => { div.style.display = "none"; }, 5000);
        }

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "user" }, { fps: 15, qrbox: 250 }, onScanSuccess);
