<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>警員報到系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
    /* 強制鎖定配色，防止裝置自動反轉 */
    :root {
        --bg-color: #f4f4f9;
        --card-bg: #ffffff;
    }

    body { 
        text-align: center; 
        padding: 20px; 
        font-family: sans-serif; 
        background-color: var(--bg-color) !important; /* 強制背景色 */
        color: #000 !important; /* 強制文字為黑色 */
    }

    #reader { width: 100%; max-width: 400px; margin: auto; border: 2px solid #ccc; }
    
    .result { 
        margin-top: 20px; 
        padding: 20px; 
        border-radius: 10px; 
        display: none; 
    }

    .card { 
        background: var(--card-bg) !important; /* 強制卡片白色 */
        padding: 15px; 
        border-radius: 8px; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    }
    </style>
</head>
<body>

    <h1>🚨 報到終端</h1>
    <div id="reader"></div>

    <div id="result" class="result">
        <div class="card">
            <h2 id="msg"></h2>
            <p id="info"></p>
        </div>
    </div>

    <script>
        // 在這裡直接編輯名單 (單位與職稱可自由修改)
        const db = {
            "P10501": { name: "陳正義", dept: "自由方程式警局", title: "新手警員" },
            "P10502": { name: "林志強", dept: "自由方程式警局", title: "新手警員" }
        };

        function onScanSuccess(decodedText) {
            const id = decodedText.trim();
            const person = db[id];
            const div = document.getElementById('result');
            
            if (person) {
                document.getElementById('msg').innerText = "✅ 報到成功：" + person.name;
                document.getElementById('info').innerText = "單位：" + person.dept + " | 職稱：" + person.title;
                div.style.backgroundColor = "#d4edda";
            } else {
                document.getElementById('msg').innerText = "❌ 無此編號：" + id;
                document.getElementById('info').innerText = "請聯繫管理員";
                div.style.backgroundColor = "#f8d7da";
            }
            div.style.display = "block";
            setTimeout(() => { div.style.display = "none"; }, 5000);
        }

        new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }).render(onScanSuccess);
    </script>
</body>
</html>
