<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>報到系統 - 寶石收集器風格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .bounce-in { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes bounceIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center text-white">

    <div class="glass w-full max-w-sm p-8 rounded-[3rem] shadow-2xl text-center">
        <h1 class="text-xs font-bold text-cyan-400 tracking-[0.3em] mb-6">COLLECTING...</h1>
        
        <div id="reader" class="w-full rounded-[2rem] overflow-hidden"></div>
        
        <div id="result" class="hidden bounce-in">
            <div id="avatarBox" class="w-28 h-28 mx-auto rounded-full bg-gradient-to-br from-yellow-400 to-orange-500 p-1 mb-4 shadow-[0_0_30px_rgba(251,191,36,0.5)]">
                <img id="userAvatar" src="" class="w-full h-full rounded-full object-cover bg-white">
            </div>
            
            <h2 id="userName" class="text-3xl font-black"></h2>
            <p id="userTitle" class="text-yellow-400 font-bold mt-1"></p>
            <p id="userDept" class="text-white/60 text-sm mt-1"></p>
        </div>
    </div>

    <script>
        // 你的資料庫
        const staffDatabase = {
            "P10503": {
                name: "張明輝",
                dept: "保安警察大隊",
                title: "中隊長",
                avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150"
            }
        };

        const readerDiv = document.getElementById('reader');
        const resultDiv = document.getElementById('result');

        function onScanSuccess(decodedText) {
            const staff = staffDatabase[decodedText];
            if (staff) {
                document.getElementById('userName').innerText = staff.name;
                document.getElementById('userTitle').innerText = staff.title;
                document.getElementById('userDept').innerText = staff.dept;
                document.getElementById('userAvatar').src = staff.avatar;
                
                readerDiv.style.display = 'none';
                resultDiv.classList.remove('hidden');

                // 像收集寶石一樣，3秒後自動重置
                setTimeout(() => {
                    resultDiv.classList.add('hidden');
                    readerDiv.style.display = 'block';
                }, 3000);
            } else {
                alert("查無此 ID");
            }
        }

        new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }).render(onScanSuccess);
    </script>
</body>
</html>
