        .result { margin-top: 20px; padding: 15px; border: 1px solid #0f0; text-align: center; display: none; width: 100%; max-width: 350px; }

        function onScanSuccess(decodedText) {
            const id = decodedText.trim();
            const person = db[id];
            const div = document.getElementById('result');
            div.style.display = "block";
            if (person) {
                document.getElementById('msg').innerText = "報到成功: " + person.name;
                document.getElementById('info').innerText = `${person.dept} | ${person.title} | ${person.group}`;
            } else {
                document.getElementById('msg').innerText = "系統錯誤";
                document.getElementById('info').innerText = "查無此編號: " + id;
            }
            setTimeout(() => { div.style.display = "none"; }, 5000);
        }

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "user" }, { fps: 10, qrbox: 250 }, onScanSuccess);
